name: Publish ERA v2

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-era-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Replace repository with tested ERA v2
        shell: bash
        run: |
          base64 -d .github/era-v2-release.b64 > /tmp/era-v2-release.zip
          git rm -rf .
          unzip -oq /tmp/era-v2-release.zip -d .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish ERA Telegram bot v2"
          git push origin HEAD:main
